<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>历史聊天记录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: #f5f6f7;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* 顶部导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-back {
      font-size: 24px;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
    }

    .navbar-title {
      font-size: 17px;
      font-weight: 600;
      color: #000;
    }

    .navbar-close {
      font-size: 28px;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* 搜索框 */
    .search-container {
      padding: 12px 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .search-box {
      display: flex;
      align-items: center;
      background-color: #f5f5f5;
      border-radius: 20px;
      padding: 8px 14px;
    }

    .search-icon {
      font-size: 18px;
      color: #999;
      margin-right: 8px;
    }

    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder {
      color: #999;
    }

    /* 聊天内容区域 */
    .chat-container {
      padding: 16px 12px 40px 12px;
    }

    .chat-container .message-row.right {
      margin-right: -12px;
      padding-right: 12px;
    }

    .timestamp {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin: 20px 0;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .message-row.left {
      justify-content: flex-start;
    }

    .message-row.right {
      justify-content: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .message-content {
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message-row.left .message-content {
      align-items: flex-start;
      margin-left: 10px;
    }

    .message-row.right .message-content {
      align-items: flex-end;
      margin-right: 0;
    }

    .message-sender {
      font-size: 12px;
      color: #999;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .message-row.left .message-bubble {
      background-color: #ffffff;
      color: #000;
    }

    .message-row.right .message-bubble {
      background-color: #6fb3ff;
      color: #ffffff;
    }

    .link-text {
      color: #fff;
      text-decoration: underline;
    }

    .emoji-bubble {
      background-color: #6fb3ff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 24px;
    }

    .no-more {
      text-align: center;
      font-size: 14px;
      color: #ccc;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <button class="navbar-back" onclick="window.history.back()">‹</button>
    <h1 class="navbar-title">历史聊天记录</h1>
    <button class="navbar-close" onclick="window.history.back()">×</button>
  </nav>

  <!-- 搜索框 -->
  <div class="search-container">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="请输入关键字搜索">
    </div>
  </div>

  <!-- 聊天内容区域 -->
  <div class="chat-container">
    <!-- 时间戳 -->
    <div class="timestamp">2025 年 12 月 26 日 14:27</div>

    <!-- 消息 -->
    <div class="message-row right">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23ffd76e'/%3E%3Crect x='35' y='55' width='30' height='35' fill='%23fff'/%3E%3C/svg%3E" alt="头像" class="message-avatar">
      <div class="message-content">
        <span class="message-sender">熊家明</span>
        <div class="message-bubble">
          感谢您一直以来的支持与信任，我们为您赠送一张【11-11 消费节】，点击<span class="link-text">http://7sen.cn/9gAe</span>，查看优惠券详情
        </div>
      </div>
    </div>

    <!-- 时间戳 -->
    <div class="timestamp">01 月 20 日 13:55</div>

    <!-- 消息 -->
    <div class="message-row right">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23ffd76e'/%3E%3Crect x='35' y='55' width='30' height='35' fill='%23fff'/%3E%3C/svg%3E" alt="头像" class="message-avatar">
      <div class="message-content">
        <span class="message-sender">叶叶</span>
        <div class="emoji-bubble">😁😁</div>
      </div>
    </div>

    <!-- 消息 -->
    <div class="message-row left">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e0e0e0'/%3E%3Ccircle cx='50' cy='40' r='25' fill='%23fff'/%3E%3Crect x='35' y='65' width='30' height='25' fill='%23fff'/%3E%3C/svg%3E" alt="头像" class="message-avatar">
      <div class="message-content">
        <div class="message-bubble">晚点回你</div>
      </div>
    </div>

    <!-- 消息 -->
    <div class="message-row right">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23ffd76e'/%3E%3Crect x='35' y='55' width='30' height='35' fill='%23fff'/%3E%3C/svg%3E" alt="头像" class="message-avatar">
      <div class="message-content">
        <span class="message-sender">叶叶</span>
        <div class="message-bubble">
          感谢您的信任，您已预约成功【光子嫩肤】<br>
          具体信息如下：<br>
          预约时间：2026 年 01 月 20 日 14:00<br>
          预约员工：胡灿<br>
          预约地址：上海 1，请合理安排时间提前到达~<br>
          点击<span class="link-text">http://7sen.cn/dJ4R</span>，查看预约详情，我们期待您的到来
        </div>
      </div>
    </div>

    <div class="no-more">~没有更多数据啦~</div>
  </div>
</body>
</html>
