<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>新增事项</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: #f5f6f7;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-close {
      font-size: 24px;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
    }

    .navbar-title {
      font-size: 17px;
      font-weight: 600;
      color: #000;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .navbar-more {
      font-size: 20px;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
    }

    .navbar-icon {
      width: 24px;
      height: 24px;
      border: 2px solid #000;
      border-radius: 50%;
    }

    /* 内容区域 */
    .content {
      background-color: #ffffff;
      margin-bottom: 12px;
    }

    /* 日期选择 */
    .date-section {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .date-icon {
      font-size: 20px;
      color: #999;
    }

    .date-text {
      font-size: 20px;
      font-weight: 600;
      color: #000;
    }

    /* 选择事项 */
    .todo-section {
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .section-title {
      font-size: 15px;
      color: #333;
      margin-bottom: 12px;
    }

    .todo-types {
      display: flex;
      gap: 0;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
    }

    .todo-type {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px;
      border-right: 1px solid #e5e5e5;
      background-color: #fff;
      font-size: 14px;
      color: #333;
    }

    .todo-type:last-child {
      border-right: none;
    }

    .todo-icon {
      font-size: 16px;
    }

    /* 备注 */
    .note-section {
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .note-title {
      font-size: 15px;
      color: #333;
      margin-bottom: 12px;
    }

    .note-textarea {
      width: 100%;
      height: 100px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    .note-textarea::placeholder {
      color: #ccc;
    }

    .note-count {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .note-count span {
      font-size: 12px;
      color: #ccc;
      background-color: #f5f5f5;
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* 添加规则 */
    .rule-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
    }

    .rule-checkbox {
      width: 20px;
      height: 20px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rule-text {
      font-size: 15px;
      color: #333;
    }

    /* 保存按钮 */
    .save-btn {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background-color: #6fb3ff;
      color: white;
      text-align: center;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <button class="navbar-close" onclick="window.history.back()">×</button>
    <h1 class="navbar-title">新增事项</h1>
    <div class="navbar-right">
      <button class="navbar-more">⋯</button>
      <div class="navbar-icon"></div>
    </div>
  </nav>

  <!-- 日期选择 -->
  <div class="content">
    <div class="date-section">
      <span class="date-icon">📅</span>
      <span class="date-text">明天</span>
    </div>

    <!-- 选择事项 -->
    <div class="todo-section">
      <h2 class="section-title">选择事项</h2>
      <div class="todo-types">
        <button class="todo-type">
          <span class="todo-icon">📞</span>
          电话回访
        </button>
        <button class="todo-type">
          <span class="todo-icon">✉️</span>
          短信回访
        </button>
        <button class="todo-type">
          <span class="todo-icon">🎂</span>
          母亲生日
        </button>
      </div>
    </div>

    <!-- 备注 -->
    <div class="note-section">
      <h2 class="section-title">备注</h2>
      <textarea class="note-textarea" placeholder=""></textarea>
      <div class="note-count">
        <span>1</span>
        <span>1</span>
      </div>
    </div>

    <!-- 添加规则 -->
    <div class="rule-section">
      <div class="rule-checkbox"></div>
      <span class="rule-text">添加规则</span>
    </div>
  </div>

  <!-- 保存按钮 -->
  <button class="save-btn">保存</button>
</body>
</html>
