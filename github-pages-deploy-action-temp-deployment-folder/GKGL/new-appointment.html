<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>新建预约</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: #f5f6f7;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-back {
      font-size: 24px;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
    }

    .navbar-title {
      font-size: 17px;
      font-weight: 600;
      color: #000;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .navbar-more {
      font-size: 20px;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
    }

    .navbar-icon {
      width: 24px;
      height: 24px;
      border: 2px solid #000;
      border-radius: 50%;
    }

    /* 客户信息 */
    .customer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .customer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .customer-icon {
      font-size: 20px;
    }

    .customer-name {
      font-size: 16px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-member {
      background-color: #87cefa;
      color: white;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
    }

    .customer-phone {
      font-size: 15px;
      color: #666;
    }

    .customer-arrow {
      color: #ccc;
      font-size: 18px;
    }

    /* 服务项目 */
    .services-section {
      background-color: #ffffff;
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .services-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .services-icon {
      font-size: 20px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background-color: #fff;
    }

    .service-name {
      font-size: 14px;
      color: #333;
    }

    .service-count {
      font-size: 14px;
      color: #666;
    }

    .service-check {
      width: 16px;
      height: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #ccc;
    }

    .more-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background-color: #fff;
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      cursor: pointer;
    }

    /* 员工选择 */
    .staff-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .staff-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .staff-icon {
      font-size: 20px;
    }

    .staff-name {
      font-size: 15px;
      color: #333;
    }

    .section-arrow {
      color: #ccc;
      font-size: 18px;
    }

    /* 时间选择 */
    .time-section {
      display: flex;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .time-item {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-right: 1px solid #f0f0f0;
    }

    .time-item:last-child {
      border-right: none;
    }

    .time-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-icon {
      font-size: 18px;
    }

    .time-text {
      font-size: 15px;
      color: #333;
    }

    /* 确认按钮 */
    .confirm-btn {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background-color: #6fb3ff;
      color: white;
      text-align: center;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
  </style>
</head>
